<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscilloscope Client</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background-color: #111;
            padding: 10px;
            border-bottom: 1px solid #00ff00;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            margin: 0;
            color: #00ff00;
            text-align: center;
            flex: 1;
        }
        
        .settings-display {
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .settings-display span {
            background-color: #222;
            padding: 4px 8px;
            border: 1px solid #00ff00;
            border-radius: 3px;
        }
        
        .trigger-display {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .probe-display {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .probe-status {
            background-color: #333;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
        }
        
        .channels-display {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .channel-status {
            background-color: #222;
            padding: 2px 6px;
            border: 1px solid #00ff00;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .channel-status.enabled {
            background-color: #004400;
            border-color: #00ff00;
        }
        
        .channel-status.disabled {
            background-color: #440000;
            border-color: #ff0000;
            color: #ff6666;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .plot-area {
            height: 500px; /* Fixed height for oscilloscope display */
            background-color: #000;
            position: relative;
            margin: 10px;
            border: 1px solid #00ff00;
            overflow: hidden; /* Prevent scrolling within plot area */
        }
        
        #gridOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .cli-area {
            height: 200px;
            min-height: 150px;
            max-height: 50vh;
            background-color: #000;
            border-top: 3px solid #00ff00;
            display: flex;
            flex-direction: column;
            resize: vertical;
            overflow: hidden;
            position: relative;
        }
        
        .cli-area::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 0;
            right: 0;
            height: 3px;
            background-color: #00ff00;
            cursor: ns-resize;
        }
        
        .resize-handle {
            position: absolute;
            top: -3px;
            left: 0;
            right: 0;
            height: 3px;
            background-color: #00ff00;
            cursor: ns-resize;
            z-index: 10;
        }
        
        .resize-handle:hover {
            background-color: #00ff88;
        }
        
        .cli-output {
            flex: 1;
            background-color: #000;
            color: #00ff00;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-y: auto;
            border: none;
            outline: none;
        }
        
        .cli-input {
            display: flex;
            background-color: #111;
            padding: 5px;
            border-top: 1px solid #00ff00;
        }
        
        .cli-prompt {
            color: #00ff00;
            margin-right: 5px;
            font-family: 'Courier New', monospace;
        }
        
        .cli-entry {
            flex: 1;
            background-color: #000;
            color: #00ff00;
            border: none;
            outline: none;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        
        .status-bar {
            background-color: #111;
            padding: 5px 10px;
            border-top: 1px solid #00ff00;
            font-size: 12px;
        }
        
        #oscilloscopeChart {
            background-color: #000;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Oscilloscope Client</h1>
        <div class="settings-display">
            <span id="voltsPerDivDisplay">Volts/div: --</span>
            <span id="timePerDivDisplay">Time/div: --</span>
            <span id="captureModeDisplay">Mode: --</span>
            <div class="trigger-display" id="triggerDisplay">
                <span>Trigger:</span>
                <span id="triggerSourceDisplay">Source: --</span>
                <span id="triggerLevelDisplay">Level: --</span>
                <span id="triggerSlopeDisplay">Edge: --</span>
            </div>
            <div class="channels-display" id="channelsDisplay" style="display: none;">
                <span>Channels:</span>
                <span id="channelA" class="channel-status">A: --</span>
                <span id="channelB" class="channel-status">B: --</span>
                <span id="channelC" class="channel-status">C: --</span>
                <span id="channelD" class="channel-status">D: --</span>
            </div>
            <div class="probe-display" id="probeDisplay" style="display: none;">
                <span>Probes:</span>
                <span id="probeA" class="probe-status">A: 10x</span>
                <span id="probeB" class="probe-status">B: 10x</span>
                <span id="probeC" class="probe-status">C: 10x</span>
                <span id="probeD" class="probe-status">D: 10x</span>
            </div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="plot-area">
            <canvas id="waveformCanvas"></canvas>
            <canvas id="gridOverlay"></canvas>
        </div>
        
        <div class="cli-area" id="cliArea">
            <div class="resize-handle" id="resizeHandle"></div>
            <div class="cli-output" id="cliOutput"></div>
            <div class="cli-input">
                <span class="cli-prompt">oscilloscope></span>
                <input type="text" class="cli-entry" id="cliEntry" autocomplete="off">
            </div>
        </div>
    </div>
    
    <div class="status-bar" id="statusBar">
        Status: Disconnected | Host: localhost:8082 | ⌘K to generate a command | Ctrl+R to search history
    </div>

    <script>
        class OscilloscopeClient {
            constructor() {
                this.ws = null;
                this.connected = false;
                this.waveformCanvas = null;
                this.waveformCtx = null;
                this.commandHistory = [];
                this.historyIndex = -1;
                
                // Oscilloscope settings
                this.voltsPerDiv = 0.01; // Default 10mV/div
                this.timePerDiv = 1e-6;  // Default 1μs/div
                this.voltageOffset = 0.0; // Default 0V offset
                this.timeOffset = 0.0;    // Default 0s time offset
                this.captureMode = 'normal'; // Default capture mode
                
                // Channel states
                this.channelStates = {
                    'A': false,
                    'B': false,
                    'C': false,
                    'D': false
                };
                
                // Store triggered data for saving
                this.lastTriggeredData = null;
                
                // Trigger settings
                this.triggerSource = 'A';
                this.triggerLevel = 0.0;    // Scaled trigger level
                this.rawTriggerLevel = 0.0; // Raw trigger level from daemon
                this.triggerSlope = 'rising';
                this.showTriggerLine = true; // Show trigger line by default
                
                // Probe attenuation settings (1x, 10x, 100x)
                this.probeAttenuation = {
                    'A': 10,  // Default 10x
                    'B': 10,  // Default 10x
                    'C': 10,  // Default 10x
                    'D': 10   // Default 10x
                };
                
                // Flag to ignore triggered data after stop command
                this.ignoreTriggeredData = false;
                
                // Channel count (will be set when we query the oscilloscope)
                this.channelCount = 0;
                
                // Get host and port from URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                this.host = urlParams.get('host') || 'localhost';
                this.port = parseInt(urlParams.get('port')) || 8082;
                
                this.initCanvas();
                this.initCLI();
                this.initResize();
                this.drawGrid();
                this.updateTriggerDisplay();
                this.updateProbeDisplay();
                this.logMessage("Oscilloscope Web Client Ready");
                this.logMessage(`Target: ${this.host}:${this.port}`);
                this.logMessage("Type 'help' for available commands");
                this.logMessage("Type 'connect' to connect to daemon");
                this.logMessage("");
            }
            
            initCanvas() {
                this.waveformCanvas = document.getElementById('waveformCanvas');
                this.waveformCtx = this.waveformCanvas.getContext('2d');
                
                // Set canvas size to match the plot area
                this.resizeCanvas();
                
                // Set canvas style
                this.waveformCtx.strokeStyle = '#00ff00';
                this.waveformCtx.lineWidth = 3; // Make line thicker
                this.waveformCtx.lineCap = 'round';
                this.waveformCtx.lineJoin = 'round';
            }
            
            resizeCanvas() {
                const plotArea = document.querySelector('.plot-area');
                const rect = plotArea.getBoundingClientRect();
                
                // Set canvas size to match the plot area
                this.waveformCanvas.width = rect.width;
                this.waveformCanvas.height = rect.height;
                
                // Set canvas position to overlay the plot area
                this.waveformCanvas.style.position = 'absolute';
                this.waveformCanvas.style.top = '0';
                this.waveformCanvas.style.left = '0';
                this.waveformCanvas.style.pointerEvents = 'none';
                this.waveformCanvas.style.zIndex = '2';
                
                // Debug: log canvas size
                console.log(`Canvas resized to: ${rect.width}x${rect.height}`);
            }
            
            
            drawGrid() {
                const canvas = document.getElementById('gridOverlay');
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                
                // Set canvas size to match the plot area
                canvas.width = rect.width;
                canvas.height = rect.height;
                
                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Set grid style
                ctx.strokeStyle = 'rgba(0, 255, 0, 0.5)';
                ctx.lineWidth = 1;
                
                // Draw vertical lines (9 lines for 8 divisions, centered at 0)
                for (let i = -4; i <= 4; i++) {
                    const x = ((i + 4) / 8) * canvas.width;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
                
                // Draw horizontal lines (9 lines for 8 divisions, centered at 0)
                for (let i = -4; i <= 4; i++) {
                    const y = ((i + 4) / 8) * canvas.height;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }
            }
            
            initCLI() {
                const cliEntry = document.getElementById('cliEntry');
                const cliOutput = document.getElementById('cliOutput');
                
                cliEntry.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        this.sendCommand();
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        this.historyUp();
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        this.historyDown();
                    } else if (e.ctrlKey && e.key === 'r') {
                        e.preventDefault();
                        this.searchHistory();
                    } else if (e.key === 'Escape') {
                        cliEntry.value = '';
                    }
                });
                
                cliEntry.focus();
            }
            
            initResize() {
                const resizeHandle = document.getElementById('resizeHandle');
                const cliArea = document.getElementById('cliArea');
                let isResizing = false;
                
                resizeHandle.addEventListener('mousedown', (e) => {
                    isResizing = true;
                    document.body.style.cursor = 'ns-resize';
                    e.preventDefault();
                });
                
                document.addEventListener('mousemove', (e) => {
                    if (!isResizing) return;
                    
                    const rect = cliArea.getBoundingClientRect();
                    const newHeight = window.innerHeight - e.clientY - 10; // 10px margin from bottom
                    const minHeight = 150;
                    const maxHeight = window.innerHeight * 0.5;
                    
                    if (newHeight >= minHeight && newHeight <= maxHeight) {
                        cliArea.style.height = newHeight + 'px';
                    }
                });
                
                document.addEventListener('mouseup', () => {
                    isResizing = false;
                    document.body.style.cursor = 'default';
                });
            }
            
            logMessage(message, type = 'info') {
                const cliOutput = document.getElementById('cliOutput');
                const timestamp = new Date().toLocaleTimeString();
                let prefix = '[INFO]';

                if (type === 'error') prefix = '[ERROR]';
                else if (type === 'response') prefix = '[RESPONSE]';
                else if (type === 'data') prefix = '[DATA]';
                
                const formattedMsg = `[${timestamp}] ${prefix} ${message}`;
                cliOutput.innerHTML += formattedMsg + '<br>';
                cliOutput.scrollTop = cliOutput.scrollHeight;
            }
            
            sendCommand() {
                const cliEntry = document.getElementById('cliEntry');
                const cmd = cliEntry.value.trim();
                
                if (!cmd) {
                    // Just add a new line if empty command
                    this.logMessage(`oscilloscope> `);
                    return;
                }
                
                cliEntry.value = '';
                this.logMessage(`oscilloscope> ${cmd}`);
                
                // Add to history
                if (!this.commandHistory.includes(cmd)) {
                    this.commandHistory.push(cmd);
                }
                this.historyIndex = -1;
                
                this.executeCommand(cmd);
            }
            
            executeCommand(cmd) {
                const parts = cmd.split(' ');
                const command = parts[0].toLowerCase();
                
                switch (command) {
                    case 'help':
                    case 'h':
                        this.showHelp();
                        break;
                    case 'connect':
                    case 'c':
                        this.connect();
                        break;
                    case 'disconnect':
                    case 'd':
                        this.disconnect();
                        break;
                    case 'status':
                    case 's':
                        this.showStatus();
                        break;
                    case 'clear':
                    case 'cls':
                        document.getElementById('cliOutput').innerHTML = '';
                        break;
                    case 'save':
                    case 'save_data':
                        this.saveTriggeredData();
                        break;
                    case 'enable':
                    case 'e':
                        if (parts.length >= 2) {
                            const channel = this.parseChannelId(parts[1]);
                            this.sendWebSocketCommand({
                                command: 'EnableChannel',
                                channel: channel
                            });
                            // Update client-side state immediately
                            const channelStr = this.formatChannelId(channel);
                            this.channelStates[channelStr] = true;
                            this.updateChannelDisplay();
                        } else {
                            this.logMessage('Usage: enable <channel>', 'error');
                        }
                        break;
                    case 'disable':
                    case 'd':
                        if (parts.length >= 2) {
                            const channel = this.parseChannelId(parts[1]);
                            this.sendWebSocketCommand({ 
                                command: 'DisableChannel', 
                                channel: channel 
                            });
                            // Update client-side state immediately
                            const channelStr = this.formatChannelId(channel);
                            this.channelStates[channelStr] = false;
                            this.updateChannelDisplay();
                        } else {
                            this.logMessage('Usage: disable <channel>', 'error');
                        }
                        break;
                    case 'sv':
                    case 'v':
                        if (parts.length >= 3) {
                            const newVoltsPerDiv = parseFloat(parts[2]);
                            this.sendWebSocketCommand({ 
                                command: 'SetVoltsPerDiv', 
                                channel: this.parseChannelId(parts[1]), 
                                volts_per_div: newVoltsPerDiv 
                            });
                            // Update client-side setting immediately
                            this.voltsPerDiv = newVoltsPerDiv;
                            this.updateSettingsDisplay();
                        } else {
                            this.logMessage('Usage: sv <channel> <volts>', 'error');
                        }
                        break;
                    case 'tp':
                    case 't':
                        if (parts.length >= 2) {
                            const newTimePerDiv = parseFloat(parts[1]);
                            this.sendWebSocketCommand({ 
                                command: 'SetTimePerDiv', 
                                time_per_div: newTimePerDiv 
                            });
                            // Update client-side setting immediately
                            this.timePerDiv = newTimePerDiv;
                            this.updateSettingsDisplay();
                        } else {
                            this.logMessage('Usage: tp <time>', 'error');
                        }
                        break;
                    case 'trigger_level':
                    case 'tl':
                        if (parts.length >= 2) {
                            const newLevel = parseFloat(parts[1]);
                            this.sendWebSocketCommand({ 
                                command: 'SetTriggerLevel', 
                                trigger_level: newLevel 
                            });
                            // Update client-side setting immediately
                            this.triggerLevel = newLevel;
                            this.updateTriggerDisplay();
                        } else {
                            this.logMessage('Usage: trigger_level <volts>', 'error');
                        }
                        break;
                    case 'trigger_source':
                    case 'ts':
                        if (parts.length >= 2) {
                            const newSource = this.parseChannelId(parts[1]);
                            this.sendWebSocketCommand({ 
                                command: 'SetTriggerSource', 
                                trigger_source: newSource 
                            });
                            // Update client-side setting immediately
                            this.triggerSource = this.formatChannelId(newSource);
                            this.updateTriggerDisplay();
                        } else {
                            this.logMessage('Usage: trigger_source <channel>', 'error');
                        }
                        break;
                    case 'start':
                    case 'go':
                        this.ignoreTriggeredData = false;
                        const triggerPos = parts.length >= 2 ? parseFloat(parts[1]) : 50.0;
                        this.sendWebSocketCommand({ 
                            command: 'StartAcquisition', 
                            trigger_position_percent: triggerPos 
                        });
                        break;
                    case 'stop':
                    case 'x':
                        this.ignoreTriggeredData = true;
                        this.sendWebSocketCommand({ command: 'StopAcquisition' });
                        break;
                    case 'ready':
                    case 'r':
                        this.sendWebSocketCommand({ command: 'IsReady' });
                        break;
                    case 'coupling':
                    case 'cp':
                        if (parts.length >= 3) {
                            this.sendWebSocketCommand({ 
                                command: 'SetCoupling', 
                                channel: this.parseChannelId(parts[1]), 
                                coupling: parts[2].toUpperCase() 
                            });
                        } else {
                            this.logMessage('Usage: coupling <channel> <AC|DC|GND>', 'error');
                        }
                        break;
                    case 'trigger_slope':
                    case 'slope':
                        if (parts.length >= 2) {
                            const newSlope = parts[1].toLowerCase();
                            this.sendWebSocketCommand({ 
                                command: 'SetTriggerSlope', 
                                trigger_slope: newSlope 
                            });
                            // Update client-side setting immediately
                            this.triggerSlope = newSlope;
                            this.updateTriggerDisplay();
                        } else {
                            this.logMessage('Usage: trigger_slope <rising|falling|either>', 'error');
                        }
                        break;
                    case 'trigger_line':
                        if (parts.length >= 2) {
                            const action = parts[1].toLowerCase();
                            if (action === 'show' || action === 'on') {
                                this.showTriggerLine = true;
                                this.logMessage('Trigger line: ON', 'response');
                            } else if (action === 'hide' || action === 'off') {
                                this.showTriggerLine = false;
                                this.logMessage('Trigger line: OFF', 'response');
                            } else {
                                this.logMessage('Usage: trigger_line <show|hide|on|off>', 'error');
                                return;
                            }
                            // Redraw trigger line with new visibility
                            this.updateTriggerDisplay();
                        } else {
                            // Toggle trigger line visibility
                            this.showTriggerLine = !this.showTriggerLine;
                            const status = this.showTriggerLine ? 'ON' : 'OFF';
                            this.logMessage(`Trigger line: ${status}`, 'response');
                            this.updateTriggerDisplay();
                        }
                        break;
                    case 'probe':
                    case 'p':
                        if (parts.length >= 3) {
                            const channel = parts[1].toUpperCase();
                            const attenuation = parseFloat(parts[2]);
                            const validChannels = ['A', 'B', 'C', 'D'].slice(0, this.channelCount || 4);
                            if (validChannels.includes(channel) && [1, 10, 100].includes(attenuation)) {
                                // Send command to daemon
                                this.sendWebSocketCommand({
                                    command: 'SetAttenuation',
                                    channel: { Alphabetic: channel },
                                    attenuation: attenuation
                                });
                                // Update client-side immediately (will be confirmed by daemon response)
                                this.probeAttenuation[channel] = attenuation;
                                this.updateProbeDisplay();
                            } else {
                                const channelList = validChannels.join('|');
                                this.logMessage(`Usage: probe <${channelList}> <1|10|100>`, 'error');
                            }
                        } else if (parts.length === 2) {
                            // Show probe setting for specific channel
                            const channel = parts[1].toUpperCase();
                            const validChannels = ['A', 'B', 'C', 'D'].slice(0, this.channelCount || 4);
                            if (validChannels.includes(channel)) {
                                const attenuation = this.probeAttenuation[channel];
                                this.logMessage(`Probe ${channel}: ${attenuation}x`, 'response');
                            } else {
                                const channelList = validChannels.join('|');
                                this.logMessage(`Usage: probe <${channelList}> [1|10|100]`, 'error');
                            }
                        } else {
                            // Show all probe settings for available channels
                            this.logMessage('Probe Settings:', 'response');
                            const validChannels = ['A', 'B', 'C', 'D'].slice(0, this.channelCount || 4);
                            validChannels.forEach(channel => {
                                const attenuation = this.probeAttenuation[channel];
                                this.logMessage(`  ${channel}: ${attenuation}x`, 'response');
                            });
                        }
                        break;
                    case 'capture_mode':
                    case 'cm':
                        if (parts.length >= 2) {
                            const newMode = parts[1].toLowerCase();
                            this.sendWebSocketCommand({ 
                                command: 'SetCaptureMode', 
                                capture_mode: newMode 
                            });
                            // Update client-side setting immediately
                            this.captureMode = newMode;
                            this.updateSettingsDisplay();
                        } else {
                            this.logMessage('Usage: capture_mode <normal|single|auto>', 'error');
                        }
                        break;
                    case 'get_data':
                    case 'gd':
                        this.sendWebSocketCommand({ command: 'GetTriggeredData' });
                        break;
                    case 'is_enabled':
                    case 'ie':
                        if (parts.length >= 2) {
                            this.sendWebSocketCommand({ 
                                command: 'IsChannelEnabled', 
                                channel: this.parseChannelId(parts[1]) 
                            });
                        } else {
                            this.logMessage('Usage: is_enabled <channel>', 'error');
                        }
                        break;
                    case 'volts_offset':
                    case 'vo':
                        if (parts.length >= 3) {
                            this.sendWebSocketCommand({ 
                                command: 'SetVoltsOffset', 
                                channel: this.parseChannelId(parts[1]), 
                                volts_offset: parseFloat(parts[2]) 
                            });
                        } else {
                            this.logMessage('Usage: volts_offset <channel> <volts>', 'error');
                        }
                        break;
                    case 'get_volts_per_div':
                    case 'gv':
                        if (parts.length >= 2) {
                            this.sendWebSocketCommand({ 
                                command: 'GetVoltsPerDiv', 
                                channel: this.parseChannelId(parts[1]) 
                            });
                        } else {
                            this.logMessage('Usage: get_volts_per_div <channel>', 'error');
                        }
                        break;
                    case 'get_trigger_level':
                    case 'gtl':
                        this.sendWebSocketCommand({ command: 'GetTriggerLevel' });
                        break;
                    case 'get_trigger_source':
                    case 'gts':
                        this.sendWebSocketCommand({ command: 'GetTriggerSource' });
                        break;
                    case 'get_trigger_slope':
                    case 'gsl':
                        this.sendWebSocketCommand({ command: 'GetTriggerSlope' });
                        break;
                    case 'get_capture_mode':
                    case 'gcm':
                        this.sendWebSocketCommand({ command: 'GetCaptureMode' });
                        break;
                    case 'get_coupling':
                    case 'gc':
                        if (parts.length >= 2) {
                            this.sendWebSocketCommand({ 
                                command: 'GetCoupling', 
                                channel: this.parseChannelId(parts[1]) 
                            });
                        } else {
                            this.logMessage('Usage: get_coupling <channel>', 'error');
                        }
                        break;
                    case 'get_time_per_div':
                    case 'gt':
                        this.sendWebSocketCommand({ command: 'GetTimePerDiv' });
                        break;
                    case 'get_sample_rate':
                    case 'gsr':
                        this.sendWebSocketCommand({ command: 'GetSampleRate' });
                        break;
                    case 'get_memory_depth':
                    case 'gmd':
                        this.sendWebSocketCommand({ command: 'GetMemoryDepth' });
                        break;
                    case 'get_bandwidth':
                    case 'gbw':
                        this.sendWebSocketCommand({ command: 'GetBandwidth' });
                        break;
                    case 'get_channel_count':
                    case 'gcc':
                        this.sendWebSocketCommand({ command: 'GetChannelCount' });
                        break;
                    default:
                        this.logMessage(`Unknown command: ${command}`, 'error');
                }
            }
            
            parseChannelId(channelStr) {
                const upper = channelStr.toUpperCase();
                if (upper >= 'A' && upper <= 'D') {
                    return { Alphabetic: upper };
                } else if (upper >= '1' && upper <= '4') {
                    return { Numeric: parseInt(upper) };
                } else {
                    // Default to channel A
                    return { Alphabetic: 'A' };
                }
            }
            
            formatChannelId(channelId) {
                if (channelId.Alphabetic) {
                    return channelId.Alphabetic;
                } else if (channelId.Numeric !== undefined) {
                    return channelId.Numeric.toString();
                } else {
                    return 'Unknown';
                }
            }
            
            sendWebSocketCommand(command) {
                if (!this.connected) {
                    this.logMessage('Not connected to daemon!', 'error');
                    return;
                }
                
                try {
                    this.ws.send(JSON.stringify(command));
                    this.logMessage(`Sent: ${JSON.stringify(command)}`, 'response');
                } catch (error) {
                    this.logMessage(`Error sending command: ${error}`, 'error');
                }
            }

            connect() {
                if (this.connected) {
                    this.logMessage("Already connected", 'error');
                    return;
                }
                
                this.logMessage(`Connecting to ${this.host}:${this.port}...`);
                
                try {
                    this.ws = new WebSocket(`ws://${this.host}:${this.port}`);
                    
                    this.ws.onopen = () => {
                        this.connected = true;
                        this.updateStatus();
                        this.logMessage(`Connected to ${this.host}:${this.port}`);
                        
                        // Read current oscilloscope settings after connection
                        this.readOscilloscopeSettings();
                    };
                    
                    this.ws.onmessage = (event) => {
                        this.handleMessage(event.data);
                    };
                    
                    // Try to reduce WebSocket buffering by setting a smaller buffer
                    if (this.ws.bufferedAmount !== undefined) {
                        // Monitor buffer size
                        setInterval(() => {
                            if (this.ws && this.ws.bufferedAmount > 0) {
                                console.log(`WebSocket buffer size: ${this.ws.bufferedAmount} bytes`);
                            }
                        }, 1000);
                    }
                    
                    this.ws.onclose = () => {
                        this.connected = false;
                        this.updateStatus();
                        this.logMessage("Connection closed");
                    };
                    
                    this.ws.onerror = (error) => {
                        this.logMessage(`Connection error: ${error}`, 'error');
                    };
                    
                } catch (error) {
                    this.logMessage(`Failed to connect: ${error}`, 'error');
                }
            }
            
            disconnect() {
                if (this.ws) {
                    this.ws.close();
                    this.ws = null;
                }
                this.connected = false;
                this.updateStatus();
                this.logMessage("Disconnected from daemon");
            }
            
            showStatus() {
                const status = this.connected ? "Connected" : "Disconnected";
                this.logMessage(`Status: ${status}`);
            }
            
            readOscilloscopeSettings() {
                // First, get the number of channels available
                this.sendWebSocketCommand({
                    command: 'GetChannelCount'
                });
                
                // Read current volts_per_div for channel A (assuming it's enabled)
                this.sendWebSocketCommand({
                    command: 'GetVoltsPerDiv',
                    channel: { Alphabetic: 'A' }
                });
                
                // Read current time_per_div
                this.sendWebSocketCommand({
                    command: 'GetTimePerDiv'
                });
                
                // Read trigger settings
                this.sendWebSocketCommand({
                    command: 'GetTriggerSource'
                });
                
                this.sendWebSocketCommand({
                    command: 'GetTriggerLevel'
                });
                
                this.sendWebSocketCommand({
                    command: 'GetTriggerSlope'
                });
                
                // Read current capture mode
                this.sendWebSocketCommand({
                    command: 'GetCaptureMode'
                });
                
                // Note: Attenuation will be read after we get the channel count
                
                this.logMessage("Reading oscilloscope settings...");
            }
            
            
            historyUp() {
                if (this.historyIndex < this.commandHistory.length - 1) {
                    this.historyIndex++;
                    document.getElementById('cliEntry').value = 
                        this.commandHistory[this.commandHistory.length - 1 - this.historyIndex];
                }
            }
            
            historyDown() {
                if (this.historyIndex > 0) {
                    this.historyIndex--;
                    document.getElementById('cliEntry').value = 
                        this.commandHistory[this.commandHistory.length - 1 - this.historyIndex];
                } else if (this.historyIndex === 0) {
                    this.historyIndex = -1;
                    document.getElementById('cliEntry').value = '';
                }
            }
            
            searchHistory() {
                const searchTerm = prompt('Search command history:');
                if (searchTerm) {
                    const matches = this.commandHistory.filter(cmd => 
                        cmd.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                    if (matches.length > 0) {
                        // Show matches in console
                        this.logMessage(`Found ${matches.length} matching commands:`);
                        matches.slice(-5).forEach(cmd => this.logMessage(`  ${cmd}`));
                        
                        // Use the most recent match
                        document.getElementById('cliEntry').value = matches[matches.length - 1];
                    } else {
                        this.logMessage(`No commands found containing "${searchTerm}"`);
                    }
                }
            }
            
            handleMessage(data) {
                try {
                    const message = JSON.parse(data);
                    
                    if (message.response) {
                        // Handle response messages with proper structure
                        this.handleResponse(message);
                    } else if (message.TriggeredData) {
                        // Handle triggered data
                        this.handleTriggeredData(message.TriggeredData);
                    } else if (typeof message === 'string') {
                        // Handle case where daemon sends just response type as string
                        this.logMessage(`Response type: ${message}`, 'error');
                        this.logMessage('Daemon sent response type without data', 'error');
                    } else {
                        // Raw message for debugging
                        this.logMessage(`Raw message: ${data}`, 'response');
                    }
                } catch (error) {
                    this.logMessage(`Error parsing message: ${error}`, 'error');
                    this.logMessage(`Raw data: ${data}`, 'response');
                }
            }
            
            handleResponse(response) {
                switch (response.response) {
                    case 'StartAcquisition':
                    case 'StopAcquisition':
                    case 'ConfigureTriggerLevel':
                    case 'ConfigureTriggerSource':
                    case 'ConfigureTriggerSlope':
                    case 'ConfigureCaptureMode':
                    case 'ConfigureChannelCoupling':
                    case 'ConfigureTrigger':
                        this.logMessage('ok', 'response');
                        break;
                    case 'ConfigureChannelEnabled':
                        // Update channel state when enabled
                        if (response.channel) {
                            const channel = this.formatChannelId(response.channel);
                            this.channelStates[channel] = true;
                            this.updateChannelDisplay();
                        }
                        this.logMessage('ok', 'response');
                        break;
                    case 'ConfigureChannelDisabled':
                        // Update channel state when disabled
                        if (response.channel) {
                            const channel = this.formatChannelId(response.channel);
                            this.channelStates[channel] = false;
                            this.updateChannelDisplay();
                        }
                        this.logMessage('ok', 'response');
                        break;
                    case 'ConfigureChannelVoltsPerDiv':
                        // Update client-side volts_per_div when daemon confirms the change
                        if (response.volts_per_div !== undefined) {
                            this.voltsPerDiv = response.volts_per_div;
                        }
                        this.updateSettingsDisplay();
                        this.logMessage('ok', 'response');
                        break;
                    case 'ConfigureTimePerDiv':
                        // Update client-side time_per_div when daemon confirms the change
                        if (response.time_per_div !== undefined) {
                            this.timePerDiv = response.time_per_div;
                        }
                        this.updateSettingsDisplay();
                        this.logMessage('ok', 'response');
                        break;
                    case 'IsReady':
                        this.logMessage(`${response.is_ready}`, 'response');
                        break;
                    case 'Error':
                        this.logMessage(`Error: ${response.message}`, 'error');
                        break;
                    case 'IsChannelEnabled':
                        // Update channel state and display
                        const channel = this.formatChannelId(response.channel);
                        this.channelStates[channel] = response.is_enabled;
                        this.updateChannelDisplay();
                        this.logMessage(`${response.is_enabled}`, 'response');
                        break;
                    case 'GetVoltsPerDiv':
                        this.voltsPerDiv = response.volts_per_div;
                        this.updateSettingsDisplay();
                        this.logMessage(`${response.volts_per_div}`, 'response');
                        break;
                    case 'GetTriggerLevel':
                        // Store raw trigger level and apply probe attenuation scaling
                        this.rawTriggerLevel = response.trigger_level;
                        const triggerSourceChannel = this.triggerSource || 'A';
                        const triggerProbeAttenuation = this.probeAttenuation[triggerSourceChannel] || 1;
                        this.triggerLevel = this.rawTriggerLevel * triggerProbeAttenuation;
                        this.updateTriggerDisplay();
                        this.logMessage(`${this.triggerLevel.toFixed(3)}`, 'response');
                        break;
                    case 'GetTriggerSource':
                        this.triggerSource = this.formatChannelId(response.trigger_source);
                        this.updateTriggerDisplay();
                        this.logMessage(`${this.formatChannelId(response.trigger_source)}`, 'response');
                        break;
                    case 'GetTriggerSlope':
                        this.triggerSlope = response.trigger_slope;
                        this.updateTriggerDisplay();
                        this.logMessage(`${response.trigger_slope}`, 'response');
                        break;
                    case 'GetCaptureMode':
                        this.captureMode = response.capture_mode;
                        this.updateSettingsDisplay();
                        this.logMessage(`${response.capture_mode}`, 'response');
                        break;
                    case 'ConfigureCaptureMode':
                        this.logMessage('ok', 'response');
                        break;
                    case 'GetCoupling':
                        this.logMessage(`${response.coupling}`, 'response');
                        break;
                    case 'GetTimePerDiv':
                    case 'GetTimeConfig':
                        this.timePerDiv = response.time_per_div;
                        this.updateSettingsDisplay();
                        this.logMessage(`${response.time_per_div}`, 'response');
                        break;
                    case 'GetSampleRate':
                        this.logMessage(`${response.sample_rate}`, 'response');
                        break;
                    case 'GetMemoryDepth':
                        this.logMessage(`${response.memory_depth}`, 'response');
                        break;
                    case 'GetBandwidth':
                        this.logMessage(`${response.bandwidth}`, 'response');
                        break;
                    case 'GetChannelCount':
                        this.channelCount = response.channel_count;
                        this.logMessage(`${response.channel_count}`, 'response');
                        this.showChannels(response.channel_count);
                        this.updateProbeDisplay();
                        
                        // Read attenuation for available channels only
                        const channels = ['A', 'B', 'C', 'D'].slice(0, this.channelCount);
                        channels.forEach(channel => {
                            this.sendWebSocketCommand({
                                command: 'GetAttenuation',
                                channel: { Alphabetic: channel }
                            });
                        });
                        break;
                    case 'GetAttenuation':
                        const attenChannel = this.formatChannelId(response.channel);
                        this.probeAttenuation[attenChannel] = response.attenuation;
                        this.updateProbeDisplay();
                        
                        // Note: Trigger level scaling is handled when the trigger level is read from daemon
                        
                        this.logMessage(`${response.attenuation}`, 'response');
                        break;
                    case 'ConfigureChannelAttenuation':
                        this.logMessage('ok', 'response');
                        break;
                    case 'GetTriggeredData':
                        this.logMessage('ok', 'response');
                        break;
                    default:
                        this.logMessage(`Response: ${JSON.stringify(response)}`, 'response');
                }
            }
            
            handleTriggeredData(data) {
                // Ignore triggered data if stop command was sent
                if (this.ignoreTriggeredData) {
                    return;
                }
                
                
                
                // Store the triggered data for saving
                this.lastTriggeredData = data;
                
                // Process samples by channel - show the ENTIRE waveform
                const channelData = {};
                data.samples.forEach(sample => {
                    const channel = this.formatChannelId(sample.channel);
                    if (!channelData[channel]) {
                        channelData[channel] = { time: [], voltage: [] };
                    }
                    
                    // Calculate time relative to trigger position (trigger at x=0)
                    const time_ns = (sample.sample_index - data.trigger_position) * data.sample_interval_ns;
                    const time_us = time_ns / 1000.0; // Convert to microseconds
                    
                    channelData[channel].time.push(time_us);
                    channelData[channel].voltage.push(sample.voltage);
                });
                
                
                // Update chart with full waveform data using stored settings
                this.updateChart(channelData, this.voltsPerDiv);
            }
            
            updateChart(channelData, voltsPerDiv = 0.01) {
                // Resize canvas if needed
                this.resizeCanvas();
                
                // Clear the waveform canvas (transparent)
                this.waveformCtx.clearRect(0, 0, this.waveformCanvas.width, this.waveformCanvas.height);
                
                
                const colors = ['#ff69b4', '#ffff00', '#0000ff', '#00ff00']; // Pink, Yellow, Blue, Green
                let colorIndex = 0;
                
                // Add waveforms for each channel
                Object.entries(channelData).forEach(([channel, data]) => {
                    if (data.time.length > 0) {
                        const color = colors[colorIndex % colors.length];
                        this.waveformCtx.strokeStyle = color;
                        
                        // Filter and convert data to pixel coordinates
                        const points = data.time.map((time_us, index) => {
                            // Apply time offset: shift waveform horizontally
                            const adjustedTime_us = time_us - (this.timeOffset * 1e6);
                            
                            // Convert time to divisions (trigger at center = 0 divisions)
                            const timeDivs = adjustedTime_us / (this.timePerDiv * 1e6);
                            
                            // Apply probe attenuation correction
                            const probeAttenuation = this.probeAttenuation[channel] || 1;
                            const correctedVoltage = data.voltage[index] * probeAttenuation;
                            
                            // Apply voltage offset: shift waveform vertically from center
                            const adjustedVoltage = correctedVoltage - this.voltageOffset;
                            
                            // Convert voltage to divisions (0V at center = 0 divisions)
                            const voltageDivs = adjustedVoltage / voltsPerDiv;
                            
                            
                            return {
                                x: timeDivs,
                                y: voltageDivs
                            };
                        }).filter(point => {
                            // Only show points within the 8-division time window
                            return Math.abs(point.x) <= 4; // 4 divisions on each side of center
                        });
                        
                        // Convert divisions to pixel coordinates
                        const pixelPoints = points.map(point => {
                            // Convert divisions to pixels using the same logic as the grid
                            const x = ((point.x + 4) / 8) * this.waveformCanvas.width;
                            const y = ((4 - point.y) / 8) * this.waveformCanvas.height; // Flip Y axis
                            
                            return { x, y };
                        });
                        
                        
                        // Draw the waveform
                        if (pixelPoints.length > 0) {
                            this.waveformCtx.beginPath();
                            this.waveformCtx.moveTo(pixelPoints[0].x, pixelPoints[0].y);
                            
                            for (let i = 1; i < pixelPoints.length; i++) {
                                this.waveformCtx.lineTo(pixelPoints[i].x, pixelPoints[i].y);
                            }
                            
                            this.waveformCtx.stroke();
                        }
                        
                        colorIndex++;
                    }
                });
                
                // Draw trigger line
                this.drawTriggerLine(voltsPerDiv);
                
                // Grid is drawn by the gridOverlay canvas
            }
            
            drawTriggerLine(voltsPerDiv) {
                if (!this.showTriggerLine || this.triggerLevel === undefined || this.triggerLevel === null) {
                    return; // Trigger line hidden or no trigger level set
                }
                
                // Calculate trigger level in divisions (0V at center = 0 divisions)
                const triggerLevelDivs = this.triggerLevel / voltsPerDiv;
                
                // Convert to pixel coordinates
                const y = ((4 - triggerLevelDivs) / 8) * this.waveformCanvas.height; // Flip Y axis
                
                // Clamp to canvas bounds
                const clampedY = Math.max(0, Math.min(this.waveformCanvas.height, y));
                
                console.log(`Drawing trigger line: level=${this.triggerLevel}V, divs=${triggerLevelDivs.toFixed(2)}, y=${clampedY.toFixed(1)}`);
                
                // Set dotted line style
                this.waveformCtx.setLineDash([5, 5]); // 5px dash, 5px gap
                this.waveformCtx.strokeStyle = '#ffffff'; // White dotted line
                this.waveformCtx.lineWidth = 2;
                
                // Draw horizontal trigger line across the entire width
                this.waveformCtx.beginPath();
                this.waveformCtx.moveTo(0, clampedY);
                this.waveformCtx.lineTo(this.waveformCanvas.width, clampedY);
                this.waveformCtx.stroke();
                
                // Reset line dash for future waveform drawing
                this.waveformCtx.setLineDash([]);
            }
            
            drawTriggerLineOnly() {
                if (this.triggerLevel === undefined || this.triggerLevel === null) {
                    return; // No trigger level set
                }
                
                // Resize canvas if needed
                this.resizeCanvas();
                
                // Clear only the trigger line area (we'll redraw it)
                // For now, just clear the entire canvas and redraw the trigger line
                this.waveformCtx.clearRect(0, 0, this.waveformCanvas.width, this.waveformCanvas.height);
                
                // Calculate trigger level in divisions (0V at center = 0 divisions)
                const triggerLevelDivs = this.triggerLevel / this.voltsPerDiv;
                
                // Convert to pixel coordinates
                const y = ((4 - triggerLevelDivs) / 8) * this.waveformCanvas.height; // Flip Y axis
                
                // Clamp to canvas bounds
                const clampedY = Math.max(0, Math.min(this.waveformCanvas.height, y));
                
                console.log(`Drawing trigger line only: level=${this.triggerLevel}V, divs=${triggerLevelDivs.toFixed(2)}, y=${clampedY.toFixed(1)}`);
                
                // Set dotted line style
                this.waveformCtx.setLineDash([5, 5]); // 5px dash, 5px gap
                this.waveformCtx.strokeStyle = '#ffffff'; // White dotted line
                this.waveformCtx.lineWidth = 2;
                
                // Draw horizontal trigger line across the entire width
                this.waveformCtx.beginPath();
                this.waveformCtx.moveTo(0, clampedY);
                this.waveformCtx.lineTo(this.waveformCanvas.width, clampedY);
                this.waveformCtx.stroke();
                
                // Reset line dash for future waveform drawing
                this.waveformCtx.setLineDash([]);
            }
            
            updateStatus() {
                const statusBar = document.getElementById('statusBar');
                const status = this.connected ? "Connected" : "Disconnected";
                statusBar.textContent = `Status: ${status} | Host: ${this.host}:${this.port}`;
            }
            
            updateSettingsDisplay() {
                const voltsDisplay = document.getElementById('voltsPerDivDisplay');
                const timeDisplay = document.getElementById('timePerDivDisplay');
                const captureModeDisplay = document.getElementById('captureModeDisplay');
                
                // Format volts per div
                let voltsText = '--';
                if (this.voltsPerDiv >= 1) {
                    voltsText = `${this.voltsPerDiv.toFixed(1)}V/div`;
                } else if (this.voltsPerDiv >= 0.001) {
                    voltsText = `${(this.voltsPerDiv * 1000).toFixed(0)}mV/div`;
                } else {
                    voltsText = `${(this.voltsPerDiv * 1000000).toFixed(0)}μV/div`;
                }
                
                // Format time per div
                let timeText = '--';
                if (this.timePerDiv >= 1) {
                    timeText = `${this.timePerDiv.toFixed(1)}s/div`;
                } else if (this.timePerDiv >= 0.001) {
                    timeText = `${(this.timePerDiv * 1000).toFixed(1)}ms/div`;
                } else if (this.timePerDiv >= 0.000001) {
                    timeText = `${(this.timePerDiv * 1000000).toFixed(1)}μs/div`;
                } else {
                    timeText = `${(this.timePerDiv * 1000000000).toFixed(0)}ns/div`;
                }
                
                voltsDisplay.textContent = `Volts/div: ${voltsText}`;
                timeDisplay.textContent = `Time/div: ${timeText}`;
                captureModeDisplay.textContent = `Mode: ${this.captureMode}`;
            }
            
            showChannels(channelCount) {
                const channelsDisplay = document.getElementById('channelsDisplay');
                channelsDisplay.style.display = 'flex';
                
                // Show/hide channels based on actual count
                ['A', 'B', 'C', 'D'].forEach((channel, index) => {
                    const element = document.getElementById(`channel${channel}`);
                    if (index < channelCount) {
                        element.style.display = 'inline-block';
                        // Query this channel's state
                        this.sendWebSocketCommand({
                            command: 'IsChannelEnabled',
                            channel: { Alphabetic: channel }
                        });
                    } else {
                        element.style.display = 'none';
                    }
                });
            }
            
            updateChannelDisplay() {
                ['A', 'B', 'C', 'D'].forEach(channel => {
                    const element = document.getElementById(`channel${channel}`);
                    if (element.style.display !== 'none') {
                        const isEnabled = this.channelStates[channel];
                        element.textContent = `${channel}: ${isEnabled ? 'ON' : 'OFF'}`;
                        element.className = `channel-status ${isEnabled ? 'enabled' : 'disabled'}`;
                    }
                });
            }
            
            updateTriggerDisplay() {
                const sourceDisplay = document.getElementById('triggerSourceDisplay');
                const levelDisplay = document.getElementById('triggerLevelDisplay');
                const slopeDisplay = document.getElementById('triggerSlopeDisplay');
                
                // Redraw trigger line when trigger settings change
                this.drawTriggerLineOnly();
                
                // Format trigger level
                let levelText = '--';
                if (this.triggerLevel >= 1) {
                    levelText = `${this.triggerLevel.toFixed(2)}V`;
                } else if (this.triggerLevel >= 0.001) {
                    levelText = `${(this.triggerLevel * 1000).toFixed(1)}mV`;
                } else {
                    levelText = `${(this.triggerLevel * 1000000).toFixed(0)}μV`;
                }
                
                // Format trigger slope
                let slopeText = '--';
                switch (this.triggerSlope.toLowerCase()) {
                    case 'rising':
                        slopeText = 'Rising';
                        break;
                    case 'falling':
                        slopeText = 'Falling';
                        break;
                    case 'either':
                        slopeText = 'Either';
                        break;
                    default:
                        slopeText = this.triggerSlope;
                }
                
                sourceDisplay.textContent = `Source: ${this.triggerSource}`;
                levelDisplay.textContent = `Level: ${levelText}`;
                slopeDisplay.textContent = `Edge: ${slopeText}`;
            }
            
            updateProbeDisplay() {
                const probeDisplay = document.getElementById('probeDisplay');
                if (!probeDisplay) return;
                
                // Show probe display if we have channel count info
                if (this.channelCount && this.channelCount > 0) {
                    probeDisplay.style.display = 'flex';
                    
                    // Show/hide probe elements based on channel count
                    const channels = ['A', 'B', 'C', 'D'];
                    channels.forEach((channel, index) => {
                        const probeElement = document.getElementById(`probe${channel}`);
                        if (probeElement) {
                            if (index < this.channelCount) {
                                probeElement.style.display = 'inline-block';
                                probeElement.textContent = `${channel}: ${this.probeAttenuation[channel]}x`;
                            } else {
                                probeElement.style.display = 'none';
                            }
                        }
                    });
                } else {
                    probeDisplay.style.display = 'none';
                }
            }
            
            saveTriggeredData() {
                if (!this.lastTriggeredData) {
                    this.logMessage('No triggered data to save', 'error');
                    return;
                }
                
                // Create filename with timestamp
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                const filename = `triggered_data_${timestamp}.json`;
                
                // Create data object with metadata
                const saveData = {
                    timestamp: new Date().toISOString(),
                    oscilloscope_settings: {
                        volts_per_div: this.voltsPerDiv,
                        time_per_div: this.timePerDiv,
                        voltage_offset: this.voltageOffset,
                        time_offset: this.timeOffset
                    },
                    triggered_data: this.lastTriggeredData
                };
                
                // Create and download file
                const blob = new Blob([JSON.stringify(saveData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                this.logMessage(`Triggered data saved as ${filename}`, 'response');
            }
        }
        
        // Initialize the oscilloscope client when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            new OscilloscopeClient();
        });
    </script>
</body>
</html>
