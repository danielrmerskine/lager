<!DOCTYPE html>
<html>
<head>
    <title>WebTransport Test Client</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .connected { background-color: #d4edda; color: #155724; }
        .disconnected { background-color: #f8d7da; color: #721c24; }
        .message { background-color: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; font-size: 16px; }
        input { padding: 10px; width: 300px; font-size: 16px; }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WebTransport Test Client</h1>
        
        <div id="status" class="status disconnected">
            Disconnected
        </div>
        
        <div>
            <button id="connectBtn" onclick="connect()">Connect</button>
            <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
        </div>
        
        <div>
            <input type="text" id="messageInput" placeholder="Enter message to send" disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
        </div>
        
        <h3>Messages:</h3>
        <div id="messages"></div>
    </div>

    <script>
        let transport = null;
        let stream = null;

        function updateStatus(message, className) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${className}`;
        }

        function addMessage(message, type = 'info') {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        async function connect() {
            try {
                updateStatus('Connecting...', 'disconnected');
                addMessage('Attempting to connect to WebTransport server...');
                
                // Connect to the WebTransport server using serverCertificateHashes
                const hash = Uint8Array.from([
                    0xa8, 0x0a, 0xd2, 0x53, 0xdd, 0x27, 0x1e, 0x49, 0xac, 0x65, 0x9d, 0x38,
                    0x89, 0x32, 0x27, 0xa9, 0x61, 0xac, 0xf1, 0xa7, 0xde, 0x4f, 0xff, 0x2d,
                    0x10, 0xeb, 0xc7, 0x2f, 0x2d, 0x1e, 0x37, 0xc7
                ]);
                transport = new WebTransport('https://localhost:8081', {
                    allowPooling: false,
                    serverCertificateHashes: [{ algorithm: "sha-256", value: hash }]
                });
                
                // Wait for connection to be ready
                await transport.ready;
                updateStatus('Connected', 'connected');
                addMessage('Connected to WebTransport server!', 'connected');
                
                // Enable UI elements
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                
                // Listen for incoming streams
                transport.incomingBidirectionalStreams.getReader().read().then(async ({ value, done }) => {
                    if (!done) {
                        const [sendStream, receiveStream] = value;
                        // Handle incoming data
                        const reader = receiveStream.getReader();
                        while (true) {
                            const { value, done } = await reader.read();
                            if (done) break;
                            const message = new TextDecoder().decode(value);
                            addMessage(`Received: ${message}`, 'received');
                        }
                    }
                });
                
            } catch (error) {
                updateStatus('Connection failed', 'disconnected');
                addMessage(`Connection failed: ${error.message}`, 'error');
                console.error('WebTransport connection failed:', error);
            }
        }

        async function disconnect() {
            if (transport) {
                transport.close();
                transport = null;
            }
            
            updateStatus('Disconnected', 'disconnected');
            addMessage('Disconnected from server');
            
            // Disable UI elements
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
            document.getElementById('messageInput').disabled = true;
            document.getElementById('sendBtn').disabled = true;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || !transport) return;
            
            try {
                // Create a bidirectional stream
                const stream = await transport.createBidirectionalStream();
                
                // Send the message
                const writer = stream.writable.getWriter();
                await writer.write(new TextEncoder().encode(message));
                await writer.close();
                
                addMessage(`Sent: ${message}`, 'sent');
                input.value = '';
                
                // Read response
                const reader = stream.readable.getReader();
                const { value } = await reader.read();
                const response = new TextDecoder().decode(value);
                addMessage(`Response: ${response}`, 'received');
                
            } catch (error) {
                addMessage(`Send failed: ${error.message}`, 'error');
                console.error('Send message failed:', error);
            }
        }

        // Allow sending message with Enter key
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
