services:
  factory:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: factory
    restart: unless-stopped
    # host networking so the container can reach the lager box service on localhost:5000
    network_mode: host
    volumes:
      # Persistent storage for test results and script history
      - data:/factory/webapp/data
      # SSH keys for step_runner SSH connections to the box
      - /home/${BOX_USER:?Set BOX_USER env var}/.ssh:/root/.ssh:ro
      - ./webapp/boxes.json:/factory/webapp/boxes.json:ro
    environment:
      - LAGER_WEBAPP_BOXES_FILE=/factory/webapp/boxes.json

volumes:
  data:
