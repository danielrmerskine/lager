{% extends "base.html" %}
{% block title %}New Line - {{ box.get('name', box_name) }} - Lager Factory{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="/">Dashboard</a></li>
    <li class="breadcrumb-item"><a href="/box/{{ box_name }}">{{ box.get('name', box_name) }}</a></li>
    <li class="breadcrumb-item"><a href="{{ url_for('box_lines.list_lines') }}">Lines</a></li>
    <li class="breadcrumb-item active">New Line</li>
  </ol>
</nav>

<h2 class="mb-3">New Line on {{ box.get('name', box_name) }}</h2>

<form method="post" class="col-lg-6">
  <div class="mb-3">
    <label for="name" class="form-label">Line Name</label>
    <input type="text" class="form-control" id="name" name="name" required
           placeholder="e.g., Board Test Line">
  </div>

  <div class="mb-3">
    <label for="description" class="form-label">Description (optional)</label>
    <textarea class="form-control" id="description" name="description" rows="3"
              placeholder="Describe this test line..."></textarea>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Create Line</button>
    <a href="{{ url_for('box_lines.list_lines') }}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
