{% extends "base.html" %}
{% block title %}New Station - Lager Factory{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="/">Dashboard</a></li>
    <li class="breadcrumb-item"><a href="/box/{{ box_name }}">{{ box_name }}</a></li>
    <li class="breadcrumb-item"><a href="{{ url_for('box_lines.line_detail', box_name=box_name, line_id=line.id) }}">{{ line.name }}</a></li>
    <li class="breadcrumb-item active">New Station</li>
  </ol>
</nav>

<h2 class="mb-3">New Station</h2>
<p class="text-body-secondary">Adding station to line: <strong>{{ line.name }}</strong></p>

<form method="post" class="col-lg-6">
  <div class="mb-3">
    <label for="name" class="form-label">Station Name</label>
    <input type="text" class="form-control" id="name" name="name" required
           placeholder="e.g., Import Check">
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Create Station</button>
    <a href="{{ url_for('box_lines.line_detail', box_name=box_name, line_id=line.id) }}"
       class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
