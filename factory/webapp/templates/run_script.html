{% extends "base.html" %}
{% block title %}Run Script - Lager Factory{% endblock %}

{% block content %}
<h2 class="mb-3">Run Script</h2>

<div class="row g-4">
  <!-- Left panel: controls -->
  <div class="col-lg-5">
    <!-- Box selector -->
    <div class="card mb-3">
      <div class="card-body">
        <label for="box-select" class="form-label">Box</label>
        <select id="box-select" class="form-select">
          <option value="">Select a box...</option>
          {% for box_id, box in boxes.items() %}
          <option value="{{ box_id }}" {% if box_id == selected_box %}selected{% endif %}>
            {{ box.get('name', box_id) }} ({{ box.get('ip', '') }})
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- Upload zone -->
    <div class="card mb-3">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Test Scripts</span>
        <div class="d-flex gap-2">
          <label class="btn btn-sm btn-outline-primary mb-0" for="file-input">
            Browse Files
          </label>
          <button class="btn btn-sm btn-outline-danger" onclick="clearAllScripts()"
                  id="clear-all-btn" style="display:none">
            Clear All
          </button>
        </div>
      </div>
      <div class="card-body">
        <input type="file" id="file-input" class="d-none" accept=".py" multiple>
        <div id="drop-zone" class="drop-zone mb-3">
          <div class="text-body-secondary">
            Drag and drop .py files here, or click Browse Files
          </div>
        </div>

        <!-- Script list -->
        <div id="script-list"></div>
      </div>
    </div>

    <!-- Run controls -->
    <div class="d-flex gap-2">
      <button id="run-btn" class="btn btn-success" onclick="startSuiteRun()">
        Run All
      </button>
      <button id="cancel-btn" class="btn btn-danger" onclick="cancelSuite()" disabled>
        Cancel
      </button>
    </div>
  </div>

  <!-- Right panel: output console -->
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Output</span>
        <div>
          <span id="status-bar" class="text-body-secondary small"></span>
        </div>
      </div>
      <div class="card-body p-0">
        <div id="output-console" class="console-output mb-0 p-3"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/stream.js') }}"></script>
{% endblock %}
